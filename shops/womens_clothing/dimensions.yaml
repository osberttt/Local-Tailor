# Local Tailor — Dimension Configuration
# ========================================
# Women Clothing Shop Dimensions

dimensions:

  # ── Fit & Sizing ──────────────────────────────────────────────────────────
  - name: fit_sizing
    enabled: true
    values:
      - label: "too small"
        description: "The clothing item runs small or is too tight"
      - label: "just right"
        description: "The size fits perfectly and matches expectations"
      - label: "too large"
        description: "The clothing item runs large or is too loose"
      - label: "inconsistent sizing"
        description: "Sizing varies or is unpredictable across items or body types"

  # ── Material & Quality ────────────────────────────────────────────────────
  - name: material_quality
    enabled: true
    values:
      - label: "poor quality"
        description: "Cheap fabric, weak stitching, or low durability"
      - label: "average quality"
        description: "Acceptable quality but not exceptional"
      - label: "high quality"
        description: "Good fabric, strong stitching, premium feel"
      - label: "material issues"
        description: "Problems like cheap look, print vs expected material, or fabric defects"

  # ── Style & Appearance ────────────────────────────────────────────────────
  - name: style_appearance
    enabled: true
    values:
      - label: "not flattering"
        description: "Does not look good on the wearer or body type"
      - label: "neutral style"
        description: "Average or simple appearance"
      - label: "flattering"
        description: "Enhances appearance and looks good"
      - label: "very stylish"
        description: "Trendy, unique, or highly attractive design"

  # ── Comfort & Wearability ──────────────────────────────────────────────────
  - name: comfort_wearability
    enabled: true
    values:
      - label: "uncomfortable"
        description: "Too tight, awkward fit, or difficult to wear"
      - label: "moderately comfortable"
        description: "Acceptable comfort but not perfect"
      - label: "very comfortable"
        description: "Soft, easy to wear, and pleasant"
      - label: "wearability issues"
        description: "Functional problems like zipper issues, difficult wear, or restrictive design"

  # ── Intent ────────────────────────────────────────────────────────────────
  - name: intent
    enabled: true
    values:
      - label: "needs reply"
        description: "Comment contains a direct question"
      - label: "positive review"
        description: "Positive feedback or praise"
      - label: "negative review"
        description: "Complaint or dissatisfaction"
      - label: "comparison"
        description: "Compares with another product"
      - label: "monitor"
        description: "General discussion"
      - label: "spam"
        description: "Irrelevant or promotional content"

  # ── Tone ───────────────────────────────────────────────────────────────────
  - name: tone
    enabled: true
    values:
      - label: "happy"
        description: "Excited or satisfied"
      - label: "curious"
        description: "Asking questions or unsure"
      - label: "disappointed"
        description: "Let down or expected better"
      - label: "angry"
        description: "Strong negative emotion"
      - label: "neutral"
        description: "No strong emotion"