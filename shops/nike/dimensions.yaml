dimensions:

  - name: fit
    enabled: true
    values:
      - label: "runs small"
        description: "Comments saying the shoe feels tight, narrow, short, snug, restrictive, or smaller than expected, including suggestions to size up"
      - label: "true to size"
        description: "Comments saying the shoe fits normally, fits as expected, fits fine, or does not need sizing changes"
      - label: "runs large"
        description: "Comments saying the shoe feels loose, roomy, long, wide, big, or larger than expected, including suggestions to size down"

  - name: comfort
    enabled: true
    values:
      - label: "very comfortable"
        description: "Comments expressing strong comfort, softness, support, cushioning, ease of wear, or positive wearing experience"
      - label: "average comfort"
        description: "Comments saying comfort is okay, decent, fine, not bad, acceptable, or mixed but wearable"
      - label: "uncomfortable"
        description: "Comments mentioning pain, stiffness, rubbing, blisters, soreness, pressure, fatigue, or poor support"

  - name: style
    enabled: true
    values:
      - label: "looks great"
        description: "Comments praising the design, colorway, look, appearance, shape, style, finish, or visual appeal, including short praise like 'clean', 'fire', or 'nice colorway'"
      - label: "looks different from photos"
        description: "Comments saying the actual product looks different from the website, pictures, listing, or expectation in color, material, or overall appearance"
      - label: "looks cheap"
        description: "Comments saying the product looks low quality, fake, flimsy, sloppy, plain, or poorly finished"

  - name: durability
    enabled: true
    values:
      - label: "lasts well"
        description: "Comments saying the shoe holds up well, stays in good condition, remains solid after use, or seems durable"
      - label: "wears out fast"
        description: "Comments saying the shoe wears quickly, creases badly, separates, cracks, peels, frays, or deteriorates sooner than expected"
      - label: "too early to tell"
        description: "Comments saying it is too soon to judge, they just got it, have not worn it enough, or cannot comment on durability yet"

  - name: price_value
    enabled: true
    values:
      - label: "too expensive"
        description: "Comments saying the shoe is overpriced, costly, expensive for what it is, or not worth the money"
      - label: "good value"
        description: "Comments saying the shoe is reasonably priced, fair for the quality, decent for the money, or okay value"
      - label: "worth it"
        description: "Comments strongly endorsing the value, saying the product justifies the price, is worth every penny, or is a satisfying purchase despite cost"

  - name: intent
    enabled: true
    values:
      - label: "needs reply"
        description: "Questions, requests for help, requests for sizing advice, delivery questions, product clarification, or comments clearly expecting an answer"
      - label: "positive review"
        description: "Praise, approval, recommendation, satisfaction, compliments, or generally favorable product feedback"
      - label: "negative review"
        description: "Complaints, dissatisfaction, criticism, warnings, refund-like frustration, or generally unfavorable product feedback"
      - label: "comparison"
        description: "Comments comparing this product to another shoe, model, version, brand, prior release, or alternative"
      - label: "monitor"
        description: "Short, vague, mixed, mild, tentative, observational, or early-stage comments that are not clearly strong positive, strong negative, or direct questions"
      - label: "spam"
        description: "Promotional messages, self-advertising, resale posts, unrelated links, repeated marketing, or clearly off-topic comments"

  - name: tone
    enabled: true
    values:
      - label: "happy"
        description: "Excited, pleased, enthusiastic, satisfied, impressed, celebratory, or approving emotional tone"
      - label: "curious"
        description: "Wondering, unsure, asking, exploratory, or interested emotional tone"
      - label: "disappointed"
        description: "Let down, underwhelmed, mildly upset, regretful, or unsatisfied emotional tone"
      - label: "angry"
        description: "Strongly frustrated, mad, hostile, outraged, or aggressive emotional tone"
      - label: "neutral"
        description: "Plain, factual, brief, low-emotion, matter-of-fact, or ambiguous tone, including comments like 'not bad', 'okay', 'fine', or very short reactions without strong emotion"