# Local Tailor — Pillow Shop Dimension Configuration
# ====================================================
# Defines WHAT dimensions exist and WHAT each value means.
# Training examples live separately in shops/pillow/examples.json
#
# To add a dimension: add a block here, then add examples to examples.json
# To retrain: edit examples then run: python run_pipeline.py retrain

dimensions:

  # ── Comfort ───────────────────────────────────────────────────────────────────
  - name: comfort
    enabled: true
    values:
      - label: "too firm"
        description: "The pillow is too hard, stiff, or dense for comfortable sleep"
      - label: "just right"
        description: "Comfort level is ideal — the right balance of softness and support"
      - label: "too soft"
        description: "The pillow is too soft, lacks support, head sinks in too far"
      - label: "changes over time"
        description: "Comfort noticeably changed after weeks or months of use or washing"

  # ── Shape & Thickness ────────────────────────────────────────────────────────
  - name: shape
    enabled: true
    values:
      - label: "too thin"
        description: "The pillow is too flat or lacks enough height for the reviewer"
      - label: "just right thickness"
        description: "The pillow height and loft is exactly right for the reviewer"
      - label: "too thick"
        description: "The pillow is too tall or high, causes neck to angle upward"
      - label: "loses shape"
        description: "The pillow flattens, bunches, or loses its form over time"

  # ── Durability ───────────────────────────────────────────────────────────────
  - name: durability
    enabled: true
    values:
      - label: "lasts well"
        description: "The pillow holds up well over months or years of regular use"
      - label: "degrades quickly"
        description: "The pillow wore out, compacted, or deteriorated faster than expected"
      - label: "too early to tell"
        description: "The pillow is new and the reviewer cannot yet judge longevity"

  # ── Price & Value ─────────────────────────────────────────────────────────────
  - name: price_value
    enabled: true
    values:
      - label: "too expensive"
        description: "The pillow is overpriced or does not justify its cost"
      - label: "good value"
        description: "The price is fair and appropriate for the quality received"
      - label: "worth it"
        description: "The pillow is excellent value — quality clearly justifies the price"
